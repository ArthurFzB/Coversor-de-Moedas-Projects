<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <title>Conversor</title>

</head>

<body>
    <video autoplay muted loop id="background-video">
        <source src="./assets/Bit.mp4" type="video/mp4">
    </video>
    <img class="logo" src="./assets/Conversor img.png" alt="Imagem de um conversor">
    <main>
        <label> Converter <b>De:</b>
            <select class="select-1">
                <option value="real-1">RS$ Real Brasileiro</option>
                <option value="dolar-1">US$ Dólar Americano</option>
                <option value="euro-1">€ Euro</option>
                <option value="libra-1">£ Libra</option>
            </select>
        </label>
        <label> Converter <b>Para:</b>
            <select class="select-2">
                <option value="dolar">US$ Dólar Americano</option>
                <option value="euro">€ Euro</option>
                <option value="bitcoin">₿ Bitcoin</option>
                <option value="libra">£ Libra</option>
                <option value="real">RS$ Real Brasileiro</option>
            </select>
        </label>
        <label>
            Valor:
            <input class="input-value" type="text" placeholder="R$ 10,000.00">
        </label>

        <button class="convert-button">Converter</button>

        <Section>
            <div class="currency-box">
                <img class="first-img"src="./assets/Brasil.png" alt="Moeda a Converter">
                <p class="currency" id="name-1">Real </p>
                <p class="value">Rs$ 0,00</p>
            </div>

            <img class="arrow-img" src="./assets/SetaVerde.png" alt="Seta de Conversão">


            <div class="currency-box">
                <img class="second-img"src="./assets/Dolar.png" alt="Moeda a Converter">
                <p class="currency" id="name-2">Dolar</p>
                <p class="value-2">€ 0,00</p>
            </div>
        </Section>
    </main>
    <script src="./script.js"></script>
</body>

</html>
